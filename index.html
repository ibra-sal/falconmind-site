<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falcon Mind — Restricted Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #000; }

  body {
    font-family: 'Barlow', sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
    position: relative;
  }

  .bg-img {
    position: absolute; inset: 0;
    background: url('hero-soldier.png') center/cover no-repeat;
    opacity: 0.12;
    pointer-events: none;
  }
  .bg-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  .gate {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    width: 360px;
  }

  .gate-logo {
    font-family: 'Big Shoulders Display', sans-serif;
    font-size: 22px; font-weight: 900;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: #fff; margin-bottom: 2rem;
  }

  .gate-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 10px;
  }
  .gate-eyebrow::before, .gate-eyebrow::after {
    content: ''; display: block;
    width: 20px; height: 1px; background: rgba(255,255,255,0.15);
  }

  .gate-title {
    font-family: 'Big Shoulders Display', sans-serif;
    font-size: 52px; font-weight: 900;
    text-transform: uppercase; line-height: 0.92;
    color: #fff; text-align: center;
    margin-bottom: 0.5rem;
  }

  .gate-sub {
    font-size: 13px; color: rgba(255,255,255,0.35);
    text-align: center; line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .gate-input-wrap {
    position: relative; width: 100%; margin-bottom: 0.75rem;
  }

  #gate-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 500;
    letter-spacing: 0.1em;
    padding: 14px 48px 14px 18px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #gate-input::placeholder {
    color: rgba(255,255,255,0.2);
    font-weight: 400; letter-spacing: 0.06em;
  }
  #gate-input:focus {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.07);
  }
  #gate-input.error {
    border-color: rgba(220,60,60,0.6);
    animation: shake 0.3s ease;
  }

  .gate-toggle {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.2); padding: 4px;
    display: flex; align-items: center;
    transition: color 0.2s;
  }
  .gate-toggle:hover { color: rgba(255,255,255,0.55); }

  .gate-error {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(220,80,80,0.8);
    height: 14px; text-align: center; margin-bottom: 0.75rem;
  }

  .gate-btn {
    width: 100%;
    background: #fff; color: #000;
    border: none; cursor: pointer;
    font-family: 'Big Shoulders Display', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 14px 0;
    transition: background 0.2s, color 0.2s;
  }
  .gate-btn:hover { background: rgba(255,255,255,0.85); }

  .gate-footer {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    white-space: nowrap; z-index: 2;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<div class="bg-img"></div>
<div class="bg-overlay"></div>

<div class="gate">
  <div class="gate-logo">Falcon Mind</div>
  <div class="gate-eyebrow">Restricted Access</div>
  <div class="gate-title">Authorised<br>Personnel<br>Only</div>
  <p class="gate-sub">This platform is confidential.<br>Enter your access code to continue.</p>

  <div class="gate-input-wrap">
    <input id="gate-input" type="password" placeholder="Access code" autocomplete="off" />
    <button class="gate-toggle" onclick="togglePw()">
      <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="gate-error" id="gate-error"></div>
  <button class="gate-btn" onclick="checkPassword()">Enter →</button>
</div>

<div class="gate-footer">Confidential · For authorised personnel only</div>

<script>
  const PW = 'Sebasaudivision2030';
  const KEY = 'fm_auth';

  function checkPassword() {
    const input = document.getElementById('gate-input');
    const err = document.getElementById('gate-error');
    if (input.value.trim() === PW) {
      sessionStorage.setItem(KEY, '1');
      window.location.href = 'falconmind-online.html';
    } else {
      input.classList.add('error');
      err.textContent = 'Incorrect access code. Try again.';
      input.value = '';
      input.focus();
      setTimeout(() => input.classList.remove('error'), 400);
    }
  }

  function togglePw() {
    const input = document.getElementById('gate-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('gate-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
    document.getElementById('gate-error').textContent = '';
  });

  if (sessionStorage.getItem(KEY) === '1') {
    window.location.href = 'falconmind-online.html';
  }
</script>

</body>
</html>
